# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy API first, set its URL in VITE_API_BASE for the static site, then redeploy the frontend if needed.

services:
  - type: web
    name: curalink-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: CURALINK_FAST_MODE
        value: "1"
      - key: MONGODB_URI
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        sync: false
      - key: PUBMED_EMAIL
        sync: false
      - key: PUBMED_TOOL
        value: curalink_research

  # Frontend (Vite) — free static site on *.onrender.com
  - type: web
    name: curalink-web
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    # Path is relative to the repository root (not rootDir)
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
